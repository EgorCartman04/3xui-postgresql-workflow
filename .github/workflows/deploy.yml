name: Deploy 3x-ui + PostgreSQL

on:
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: 'Режим деплоя'
        required: true
        type: choice
        default: 'update'
        options:
          - update
          - full
      xui_version:
        description: 'Версия 3x-ui (пусто = из inventory)'
        required: false
        type: string
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          ANSIBLE_DEPLOY_KEY: ${{ secrets.ANSIBLE_DEPLOY_KEY }}
        run: |
          mkdir -p .secrets/ssh
          printf '%s\n' "$ANSIBLE_DEPLOY_KEY" > .secrets/ssh/ansible_deploy_key
          chmod 600 .secrets/ssh/ansible_deploy_key
          ssh-keygen -lf .secrets/ssh/ansible_deploy_key

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 2.27.23.76 >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: pip install ansible

      - name: Syntax check
        run: ansible-playbook --syntax-check playbooks/site.yml

      - name: Deploy
        env:
          XUI_ADMIN_USERNAME: ${{ secrets.XUI_ADMIN_USERNAME }}
          XUI_ADMIN_PASSWORD: ${{ secrets.XUI_ADMIN_PASSWORD }}
          XUI_PANEL_BASE_PATH: ${{ secrets.XUI_PANEL_BASE_PATH }}
          XUI_DB_PASSWORD: ${{ secrets.XUI_DB_PASSWORD }}
          ANSIBLE_REMOTE_USER: ${{ vars.ANSIBLE_REMOTE_USER || 'root' }}
          DEPLOY_MODE: ${{ github.event.inputs.deploy_mode }}
          XUI_VERSION: ${{ github.event.inputs.xui_version }}
        run: |
          PLAYBOOK_TAGS=""
          [ "$DEPLOY_MODE" = "update" ] && PLAYBOOK_TAGS="--tags update"
          # full → без --tags: запускает весь playbook (apt + все роли + post_tasks)
          # update → --tags update: роли обновления
          ansible-playbook playbooks/site.yml \
            $PLAYBOOK_TAGS \
            ${XUI_VERSION:+-e xui_version="$XUI_VERSION"}
