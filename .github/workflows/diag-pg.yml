name: Diagnostic - PostgreSQL port investigation

on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          ANSIBLE_DEPLOY_KEY: ${{ secrets.ANSIBLE_DEPLOY_KEY }}
        run: |
          mkdir -p .secrets/ssh
          printf '%s\n' "$ANSIBLE_DEPLOY_KEY" > .secrets/ssh/ansible_deploy_key
          chmod 600 .secrets/ssh/ansible_deploy_key
          ssh-keygen -lf .secrets/ssh/ansible_deploy_key

      - name: Add remote host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 2.26.230.90 >> ~/.ssh/known_hosts

      - name: Diagnostic - PostgreSQL port configuration
        run: |
          ssh -o StrictHostKeyChecking=no -i .secrets/ssh/ansible_deploy_key root@2.26.230.90 'bash -s' << 'HEREDOC'
          set -uo pipefail

          echo "=== 1. pg_lsclusters ==="
          pg_lsclusters 2>/dev/null || echo "N/A"

          echo ""
          echo "=== 2. Слушающие порты PostgreSQL ==="
          ss -tlnp | grep postgres || echo "NO_PG_LISTEN"

          echo ""
          echo "=== 3. port в postgresql.conf (все версии) ==="
          grep -H '^port' /etc/postgresql/*/main/postgresql.conf 2>/dev/null || echo "NO_PORT_IN_CONF"

          echo ""
          echo "=== 4. port в conf.d (оверрайды) ==="
          find /etc/postgresql -name '*.conf' -path '*/conf.d/*' -exec grep -H 'port' {} \; 2>/dev/null || echo "NO_PORT_IN_CONFD"

          echo ""
          echo "=== 5. include_dir ==="
          grep -H 'include_dir' /etc/postgresql/*/main/postgresql.conf 2>/dev/null || echo "NO_INCLUDE_DIR"

          echo ""
          echo "=== 6. systemd overrides ==="
          systemctl cat postgresql 2>/dev/null | grep -i port || echo "NO_PORT_IN_SYSTEMD"
          ls /etc/systemd/system/postgresql.service.d/ 2>/dev/null || echo "NO_SYSTEMD_OVERRIDE_DIR"
          cat /etc/systemd/system/postgresql.service.d/*.conf 2>/dev/null || echo "NO_OVERRIDE_FILES"

          echo ""
          echo "=== 7. Все .conf файлы в main/ ==="
          find /etc/postgresql/ -maxdepth 3 -name '*.conf' -type f 2>/dev/null

          echo ""
          echo "=== 8. grep port по всей /etc/postgresql/ ==="
          grep -rn '^port' /etc/postgresql/ 2>/dev/null || echo "NO_PORT_ANYWHERE"

          echo ""
          echo "=== 9. systemctl status ==="
          systemctl status postgresql 2>&1 | head -20

          echo ""
          echo "=== 10. journalctl последние ошибки ==="
          journalctl -u postgresql --no-pager -n 15 2>/dev/null || echo "NO_JOURNAL"

          echo ""
          echo "=== DONE ==="
          HEREDOC
