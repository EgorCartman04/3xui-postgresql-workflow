---
- name: Установить PostgreSQL
  ansible.builtin.apt:
    name:
      - postgresql
      - postgresql-client
      - python3-psycopg2
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Запустить и включить PostgreSQL
  ansible.builtin.service:
    name: postgresql
    state: started
    enabled: true

- name: Исправить порт PostgreSQL на 5432 (PG 18 default = 5433)
  ansible.builtin.lineinfile:
    path: "/etc/postgresql/18/main/postgresql.conf"
    regexp: '^#?port\s*='
    line: 'port = 5432'
  register: pg_port_fix
  notify: Restart postgresql

# Синхронный restart: порт должен примениться до всех остальных операций с БД.
- name: Применить изменение порта (restart PostgreSQL)
  ansible.builtin.meta: flush_handlers

# После restart явно убедиться, что PostgreSQL жив и слушает 5432.
# systemd restart иногда возвращает успех до фактического запуска процесса.
- name: Убедиться, что PostgreSQL запущен и слушает порт 5432
  ansible.builtin.wait_for:
    port: 5432
    host: "{{ xui_db_host }}"
    state: started
    timeout: 30

- name: Проверить существование БД xui
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -euo pipefail
    psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ xui_db_name }}'" | grep -q 1 && echo "exists" || echo "missing"
  register: xui_db_exists
  changed_when: false

- name: Проверить существование пользователя БД
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -euo pipefail
    psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ xui_db_user }}'" | grep -q 1 && echo "exists" || echo "missing"
  register: xui_db_user_exists
  changed_when: false

# Создать пользователя (только если не существует), без ALTER USER здесь.
# ALTER USER выполняется ПОСЛЕ переключения pg_hba на scram-sha-256,
# чтобы пароль гарантированно захешировался в scram-sha-256, а не md5.
- name: Создать пользователя БД для x-ui (если не существует)
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -euo pipefail
    psql -c "CREATE USER \"{{ xui_db_user }}\" WITH PASSWORD '{{ xui_db_password }}';"
  when: "'missing' in xui_db_user_exists.stdout"

- name: Создать БД xui (если не существует)
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -euo pipefail
    psql -c "CREATE DATABASE \"{{ xui_db_name }}\" OWNER \"{{ xui_db_user }}\";"
  when: "'missing' in xui_db_exists.stdout"

# Сначала переключить pg_hba на scram-sha-256, чтобы последующий ALTER USER
# захешировал пароль правильным методом (scram-sha-256, а не md5).
# Порядок критичен: pg_hba → reload → ALTER USER → reload.
- name: Настроить локальный доступ для пользователя xui в pg_hba.conf (scram-sha-256)
  ansible.builtin.shell: |
    set -euo pipefail
    hba_file="$(find /etc/postgresql -name pg_hba.conf -path "*/main/*" | head -n 1)"
    if [ -z "${hba_file}" ]; then
      echo "ERROR: pg_hba.conf not found"
      exit 1
    fi
    # Удалить любые ранее добавленные строки для xui (старые md5-записи и комментарии)
    sed -i "/# 3x-ui local access/d; /^[[:space:]]*\(local\|host\)[[:space:]]\+{{ xui_db_name }}[[:space:]]\+{{ xui_db_user }}[[:space:]]/d" "${hba_file}"
    # Добавить актуальные записи с scram-sha-256 (соответствует password_encryption по умолчанию в PG 14+)
    {
      echo "# 3x-ui local access"
      echo "local   {{ xui_db_name }}   {{ xui_db_user }}   scram-sha-256"
      echo "host    {{ xui_db_name }}   {{ xui_db_user }}   127.0.0.1/32   scram-sha-256"
      echo "host    {{ xui_db_name }}   {{ xui_db_user }}   ::1/128       scram-sha-256"
    } >> "${hba_file}"
  args:
    executable: /bin/bash
  notify: Reload postgresql

# Синхронизировать handler-ы: гарантировать, что pg_hba перечитан ДО ALTER USER.
- name: Применить изменения pg_hba перед синхронизацией пароля
  ansible.builtin.meta: flush_handlers

# ALTER USER выполняется ПОСЛЕ reload pg_hba → пароль хешируется в scram-sha-256.
- name: Синхронизировать пароль пользователя БД с секретом (scram-safe)
  become: true
  become_user: postgres
  ansible.builtin.shell: |
    set -euo pipefail
    psql -c "ALTER USER \"{{ xui_db_user }}\" WITH PASSWORD '{{ xui_db_password }}';"
  when: "'exists' in xui_db_user_exists.stdout"
  changed_when: true
  notify: Reload postgresql

# Гарантировать, что PostgreSQL перечитал новый пароль.
- name: Применить изменения пароля перед миграцией
  ansible.builtin.meta: flush_handlers

- name: Сохранить учётные данные БД в /root/3x-ui-access.txt
  ansible.builtin.lineinfile:
    path: /root/3x-ui-access.txt
    line: "PostgreSQL: host={{ xui_db_host }} port={{ xui_db_port }} db={{ xui_db_name }} user={{ xui_db_user }}"
    create: true
    owner: root
    group: root
    mode: "0600"
    state: present
